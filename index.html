<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>
    <script>
        // Function to save data to localStorage
        function saveData() {
            const inputData = document.getElementById('dataInput').value;
            localStorage.setItem('myData', inputData);
            alert('Data saved to localStorage!');
        }

        // Function to fetch data from a Cloudflare Worker
        async function fetchData() {
            try {
                const response = await fetch('https://YOUR-WORKER-URL.workers.dev');
                const data = await response.json();
                document.getElementById('fetchedData').innerText = JSON.stringify(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>
</head>
<body>
    <h1>Welcome to My Page</h1>
    <input type="text" id="dataInput" placeholder="Enter some data">
    <button onclick="saveData()">Save Data</button>
    <button onclick="fetchData()">Fetch Data</button>
    <div>
        <h2>Fetched Data:</h2>
        <pre id="fetchedData"></pre>
    </div>
</body>
</html>
